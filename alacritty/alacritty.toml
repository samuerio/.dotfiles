[font]
  # normal = {family = "JetBrainsMono NF" ,style = "Regular"}
  # bold = {family = "JetBrainsMono NF" ,style = "Bold"}
  # italic  = {family = "JetBrainsMono NF" ,style = "Italic "}
  # bold_italic  = {family = "JetBrainsMono NF" ,style = "Bold Italic "}

  # normal = {family = "Fira Code" ,style = "Regular"}
  # bold = {family = "Fira Code" ,style = "Bold"}
  # italic  = {family = "Fira Code" ,style = "Italic "}
  # bold_italic  = {family = "Fira Code" ,style = "Bold Italic "}
  # size = 18
  normal = {family = "Monaco" ,style = "Regular"}
  bold = {family = "Monaco" ,style = "Bold"}
  italic  = {family = "Monaco" ,style = "Italic "}
  bold_italic  = {family = "Monaco" ,style = "Bold Italic "}
  size = 18

[window]
  dimensions = {columns = 110 , lines = 25}
  padding = { x = 0, y = 0 }
  dynamic_padding = false
  resize_increments = true

[keyboard]
bindings = [
  { key = "N", mods = "Control | Shift", action = "CreateNewWindow" },
  #CSI u 扩展键盘协议； Shift/Ctrl/Alt/Shift+Alt+Enter
  #Nvim 、Pi agent 支持识别；continue.ts 需要 Shift+Alt+Enter → \e[13;4u
  { key = "Return", mods = "Control", chars = "\u001b[13;5u" },
  { key = "Return", mods = "Shift", chars = "\u001b[13;2u" },
  { key = "Return", mods = "Alt", chars = "\u001b[13;3u" },
  { key = "Return", mods = "Shift | Alt", chars = "\u001b[13;4u" },
  # 显式发送 Ctrl+Shift+M/W/R/O/G，使用自定义序列避免歧义
  { key = "M", mods = "Control | Shift", chars = "\u001b[5;30012~" },
  { key = "W", mods = "Control | Shift", chars = "\u001b[5;30013~" },
  { key = "R", mods = "Control | Shift", chars = "\u001b[5;30014~" },
  { key = "O", mods = "Control | Shift", chars = "\u001b[5;30015~" },
  { key = "G", mods = "Control | Shift", chars = "\u001b[5;30016~" },
]

# Colors (Nord)

# Default colors
[colors.primary]
background = '0xfafafa'
foreground = '0x383a42'

# Normal colors
[colors.normal]
black = '0x383a42'
red = '0xe45649'
green = '0x50a14f'
yellow = '0xc18401'
blue = '0x0184bc'
magenta = '0xa626a4'
cyan = '0x0997b3'
white = '0xfafafa'

# Bright colors
[colors.bright]
black = '0x383a42'
red = '0xe45649'
green = '0x50a14f'
yellow = '0xc18401'
blue = '0x0184bc'
magenta = '0xa626a4'
cyan = '0x0997b3'
white = '0xfafafa'

[env]
  WINIT_X11_SCALE_FACTOR = "1.2"
